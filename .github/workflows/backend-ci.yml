name: Backend CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finance_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d finance_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finance_db
      JWT_ACCESS_SECRET: test_access_secret_minimum_length_12345
      JWT_REFRESH_SECRET: test_refresh_secret_minimum_length_12345
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 100
      AUTH_THROTTLE_LIMIT: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Push database schema
        run: npm run prisma:push -- --skip-generate

      - name: Seed database
        run: npm run db:seed

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test -- --passWithNoTests

      - name: E2E tests
        run: npm run test:e2e
